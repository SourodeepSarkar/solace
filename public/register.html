<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solace · Create account</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body class="auth-body">

    <div class="auth-card">
        <div class="auth-brand"><i class='bx bx-leaf'></i><span>Solace</span></div>

        <form id="registerForm">
            <h1>Create your account</h1>

            <div class="field">
                <label for="name">Full name</label>
                <div class="input-shell">
                    <input id="name" type="text" placeholder="Ada Lovelace" required autocomplete="name">
                    <i class="bx bxs-id-card"></i>
                </div>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <div class="input-shell">
                    <input id="email" type="email" placeholder="you@college.edu" required autocomplete="email">
                    <i class="bx bxs-user"></i>
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="input-shell">
                    <input id="password" type="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
                    <i class="bx bxs-lock-alt"></i>
                </div>
            </div>

            <p class="form-hint" id="formHint">Solace is invite-only for up to 5 accounts.</p>

            <button type="submit" class="btn" id="registerBtn">Create account</button>

            <div class="divider"><hr><span>OR</span><hr></div>

            <button type="button" id="googleRegister" class="btn google-btn">
                <i class="bx bxl-google"></i>
                <span>Continue with Google</span>
            </button>

            <div class="register-link">
                Already have an account? <a href="index.html">Log in</a>
            </div>
        </form>
    </div>

    <div class="toast-stack" id="toastStack"></div>

    <script type="module" src="js/register.js"></script>

</body>

</html>
