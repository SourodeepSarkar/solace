<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solace · Create account</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

    <div class="wrapper">
        <form id="registerForm">
            <h1>Register</h1>

            <div class="input-box">
                <input id="name" type="text" placeholder="Full name" required>
                <i class="bx bxs-id-card"></i>
            </div>

            <div class="input-box">
                <input id="email" type="email" placeholder="Email" required>
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input id="password" type="password" placeholder="Password (min 6 characters)" required minlength="6">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <p class="form-hint" id="formHint">Solace is currently invite-only for up to 5 accounts.</p>

            <button type="submit" class="btn">
                Create account
            </button>

            <div class="divider">
                <hr>
                <span>OR</span>
                <hr>
            </div>

            <button type="button" id="googleRegister" class="btn google-btn">
                <i class="bx bxl-google"></i>
                <span>Continue with Google</span>
            </button>

            <div class="register-link">
                <p>
                    Already have an account?
                    <a href="index.html">Login</a>
                </p>
            </div>
        </form>

    </div>

    <script type="module" src="js/register.js"></script>

</body>

</html>
