<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body class="auth-body">

    <div class="auth-card">
        <div class="auth-brand"><i class='bx bx-leaf'></i><span>Solace</span></div>

        <form id="loginForm">
            <h1>Welcome back</h1>

            <div class="field">
                <label for="email">Email</label>
                <div class="input-shell">
                    <input id="email" type="email" placeholder="you@college.edu" required autocomplete="email">
                    <i class="bx bxs-user"></i>
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="input-shell">
                    <input id="password" type="password" placeholder="••••••••" required autocomplete="current-password">
                    <i class="bx bxs-lock-alt"></i>
                </div>
            </div>

            <div class="remember-forgot">
                <label><input id="remember" type="checkbox">Remember me</label>
                <a href="#" id="forgotPassword">Forgot password?</a>
            </div>

            <button type="submit" class="btn" id="loginBtn">Log in</button>

            <div class="divider"><hr><span>OR</span><hr></div>

            <button type="button" id="googleLogin" class="btn google-btn">
                <i class="bx bxl-google"></i>
                <span>Continue with Google</span>
            </button>

            <div class="register-link">
                Don't have an account? <a href="register.html">Register</a>
            </div>
        </form>
    </div>

    <div class="toast-stack" id="toastStack"></div>

    <script type="module" src="js/auth.js"></script>

</body>

</html>
